<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор обеденного меню</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .control-group select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: white;
        }

        .control-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .control-group select:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .canvas-container {
            position: relative;
            display: inline-block;
            border: 3px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            background: #f9f9f9;
        }

        #mainCanvas {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 14px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .info {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: #667eea;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ Генератор обеденного меню</h1>

        <div class="controls">
            <div class="control-group">
                <label for="firstSelect">🍲 Первое блюдо (суп):</label>
                <select id="firstSelect">
                    <option value="">-- Выберите суп --</option>
                </select>
            </div>

            <div class="control-group">
                <label for="secondSelect">🍖 Второе блюдо:</label>
                <select id="secondSelect">
                    <option value="">-- Выберите второе --</option>
                </select>
            </div>

            <div class="control-group">
                <label for="saladSelect">🥗 Салат:</label>
                <select id="saladSelect">
                    <option value="">-- Выберите салат --</option>
                </select>
            </div>
        </div>

        <div class="preview-section">
            <div class="canvas-container">
                <div class="loading" id="loading">Загрузка...</div>
                <canvas id="mainCanvas"></canvas>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-primary" id="downloadBtn" disabled>
                📥 Скачать меню
            </button>
            <button class="btn btn-secondary" id="resetBtn">
                🔄 Сбросить
            </button>
        </div>

        <p class="info">Выберите блюда из каждого раздела, чтобы сформировать меню</p>
    </div>

    <script>
        // ============================================
        // НАСТРОЙКИ КООРДИНАТ (измените под ваш шаблон)
        // ============================================
        // Координаты указываются в пикселях относительно шаблона
        // x, y - позиция левого верхнего угла изображения блюда
        // width, height - размер изображения блюда (подгоняется под шаблон)
        const DISH_POSITIONS = {
            first: { x: 71, y: 471, width: 883, height: 353 },   // Координаты для первого блюда
            second: { x: 124, y: 675, width: 887, height: 357 },  // Координаты для второго блюда
            salad: { x: 71, y: 1026, width: 883, height: 353 }    // Координаты для салата
        };

        // Пути к папкам с изображениями
        const FOLDERS = {
            first: 'First/',
            second: 'Second/',
            salad: 'Salad/'
        };

        // ============================================
        // Основной код
        // ============================================
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const loading = document.getElementById('loading');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');

        let templateImage = null;
        const selectedDishes = {
            first: null,
            second: null,
            salad: null
        };
        const dishImages = {
            first: null,
            second: null,
            salad: null
        };

        // Загрузка шаблона
        async function loadTemplate() {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    templateImage = img;
                    canvas.width = img.width;
                    canvas.height = img.height;
                    drawCanvas();
                    loading.style.display = 'none';
                    resolve();
                };
                img.onerror = () => {
                    loading.textContent = 'Ошибка загрузки шаблона!';
                    reject(new Error('Не удалось загрузить шаблон'));
                };
                img.src = 'Shablon.png';
            });
        }

        // Отрисовка канваса
        function drawCanvas() {
            if (!templateImage) return;

            // Очищаем и рисуем шаблон
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(templateImage, 0, 0);

            // Рисуем выбранные блюда
            ['first', 'second', 'salad'].forEach(type => {
                if (dishImages[type]) {
                    const pos = DISH_POSITIONS[type];
                    ctx.drawImage(
                        dishImages[type],
                        pos.x,
                        pos.y,
                        pos.width,
                        pos.height
                    );
                }
            });

            // Накладываем фильтр (прямоугольник с режимом наложения)
            ctx.save();
            ctx.globalCompositeOperation = 'soft-light';
            ctx.fillStyle = 'rgba(115, 70, 70, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
        }

        // Загрузка изображения блюда
        function loadDishImage(type, filename) {
            return new Promise((resolve, reject) => {
                if (!filename) {
                    dishImages[type] = null;
                    resolve();
                    return;
                }

                const img = new Image();
                img.onload = () => {
                    dishImages[type] = img;
                    drawCanvas();
                    resolve();
                };
                img.onerror = () => {
                    console.error(`Ошибка загрузки изображения: ${filename}`);
                    reject(new Error(`Не удалось загрузить ${filename}`));
                };
                img.src = FOLDERS[type] + filename;
            });
        }

        // Заполнение комбобоксов
        async function populateSelects() {
            const selects = {
                first: document.getElementById('firstSelect'),
                second: document.getElementById('secondSelect'),
                salad: document.getElementById('saladSelect')
            };

            for (const [type, select] of Object.entries(selects)) {
                try {
                    // Для локальных файлов используем заранее определённые списки
                    const files = await getDishFiles(type);
                    files.forEach(file => {
                        const option = document.createElement('option');
                        option.value = file;
                        // Убираем расширение и заменяем подчёркивания на пробелы
                        option.textContent = file.replace(/_/g, ' ').replace('.png', '');
                        select.appendChild(option);
                    });
                } catch (error) {
                    console.error(`Ошибка загрузки списка для ${type}:`, error);
                }
            }
        }

        // Получение списка файлов блюд (для локального использования)
        async function getDishFiles(type) {
            // Списки файлов для каждой категории
            const dishLists = {
                first: [
                    'Суп _Борщ_.png',
                    'Суп _Вермишелевый_.png',
                    'Суп _Гороховый_.png',
                    'Суп _Грибной_.png',
                    'Суп _Рассольник_.png',
                    'Суп _Рисовый_.png',
                    'Суп _Фасолевый_.png',
                    'Суп _Щавелевый_.png',
                    'Суп _Щи_.png'
                ],
                second: [
                    'Голубцы.png',
                    'Гречка с котлетой свиной.png',
                    'Гречка с тефтелями.png',
                    'Капуста тушенная с мясом.png',
                    'Картошка тушенная с мясом.png',
                    'Макароны с гуляшом.png',
                    'Макароны с куриной отбивной.png',
                    'Макароны с тефтелями.png',
                    'Мачанка с блинами.png',
                    'Плов.png',
                    'Пюре с гуляшом.png',
                    'Пюре с котлетой.png',
                    'Пюре с куриной отбивной.png',
                    'Пюре со стожкой.png'
                ],
                salad: [] // Будет заполнено ниже
            };

            // Для салатов прочитаем из структуры папок (или можно добавить вручную)
            if (type === 'salad') {
                // Добавляем известные файлы салатов
                return [
                    'Капуста _провонсаль_.png',
                    'Морковь по-корейски с курицей.png',
                    'Салат _винегрет_.png',
                    'Салат из пекинской капусы.png',
                    'Салат из свеклы и зеленого горошка.png',
                    'Салат из свеклы.png'
                ];
            }

            return dishLists[type] || [];
        }

        // Обработчики выбора блюд
        document.getElementById('firstSelect').addEventListener('change', async (e) => {
            selectedDishes.first = e.target.value;
            await loadDishImage('first', e.target.value);
            updateDownloadButton();
        });

        document.getElementById('secondSelect').addEventListener('change', async (e) => {
            selectedDishes.second = e.target.value;
            await loadDishImage('second', e.target.value);
            updateDownloadButton();
        });

        document.getElementById('saladSelect').addEventListener('change', async (e) => {
            selectedDishes.salad = e.target.value;
            await loadDishImage('salad', e.target.value);
            updateDownloadButton();
        });

        // Обновление кнопки скачивания
        function updateDownloadButton() {
            const hasSelection = selectedDishes.first || selectedDishes.second || selectedDishes.salad;
            downloadBtn.disabled = !hasSelection;
        }

        // Скачивание готового меню
        downloadBtn.addEventListener('click', () => {
            if (!templateImage) return;

            // Создаем ссылку для скачивания
            const link = document.createElement('a');
            link.download = 'меню_' + new Date().toISOString().slice(0, 10) + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        // Сброс
        resetBtn.addEventListener('click', () => {
            // Сбрасываем селекты
            document.getElementById('firstSelect').value = '';
            document.getElementById('secondSelect').value = '';
            document.getElementById('saladSelect').value = '';

            // Сбрасываем выбранные блюда
            selectedDishes.first = null;
            selectedDishes.second = null;
            selectedDishes.salad = null;

            // Сбрасываем изображения
            dishImages.first = null;
            dishImages.second = null;
            dishImages.salad = null;

            // Перерисовываем
            drawCanvas();
            updateDownloadButton();
        });

        // Инициализация
        (async function init() {
            try {
                await loadTemplate();
                await populateSelects();
            } catch (error) {
                console.error('Ошибка инициализации:', error);
                loading.textContent = 'Ошибка загрузки. Проверьте наличие Shablon.png';
            }
        })();
    </script>
</body>
</html>

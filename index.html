<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍽️ Генератор сезонного меню 2.2</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #747B57;
            --primary-dark: #5a6143;
            --bg-gradient-1: #f5f0e8;
            --bg-gradient-2: #e8dfd0;
        }

        html, body {
            overflow-x: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            min-height: 100vh;
            padding: 15px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            color: var(--primary-dark);
            margin-bottom: 25px;
            font-size: 2rem;
            line-height: 1.2;
        }

        /* ===== ВЫБОР СЕЗОНА ===== */
        .season-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .season-btn {
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border: 2px solid #d9d4c4;
            border-radius: 30px;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .season-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .season-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .season-btn.summer.active { background: #5AA32D; border-color: #5AA32D; }
        .season-btn.spring.active { background: #A32D2D; border-color: #A32D2D; }
        .season-btn.winter.active { background: #465A73; border-color: #465A73; }
        .season-btn.autumn.active { background: #A3562D; border-color: #A3562D; }

        /* ===== СЕТКА КОНТРОЛОВ ===== */
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            background: #fafaf5;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #e8e5dc;
        }

        .control-group.span-2 { grid-column: span 2; }

        .control-group label {
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 8px;
            font-size: 0.92rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-group select {
            padding: 10px 12px;
            border: 2px solid #d9d4c4;
            border-radius: 8px;
            font-size: 0.92rem;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            color: #333;
            width: 100%;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
            padding-right: 35px;
        }

        .control-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(116, 123, 87, 0.15);
        }

        .control-group select:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Каскадные строки (категория + блюдо) — всегда 2 колонки */
        .cascaded-row {
            display: grid;
            grid-template-columns: 2fr 3fr;
            gap: 8px;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 9px;
            background: #f0efe9;
            color: #777;
            border-radius: 12px;
            font-size: 0.72rem;
            margin-top: 6px;
            align-self: flex-start;
        }

        .status-badge.active { background: var(--primary); color: white; }

        /* ===== ПРЕВЬЮ ===== */
        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }

        .canvas-container {
            position: relative;
            display: inline-block;
            border: 3px solid #d9d4c4;
            border-radius: 12px;
            overflow: hidden;
            background: #f9f9f9;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 100%;
        }

        #mainCanvas {
            display: block;
            max-width: 100%;
            height: auto;
        }

        /* ===== КНОПКИ ===== */
        .buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 140px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(116, 123, 87, 0.35);
        }

        .btn-secondary {
            background: #f0efe9;
            color: var(--primary-dark);
            border: 2px solid #d9d4c4;
        }

        .btn-secondary:hover { background: #e8e5dc; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .info {
            text-align: center;
            color: #888;
            font-size: 0.88rem;
            margin-top: 15px;
            line-height: 1.5;
        }

        /* ===== LOADING ===== */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1rem;
            color: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 4px solid #e8e5dc;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary-dark);
            color: white;
            padding: 12px 22px;
            border-radius: 30px;
            font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: all 0.4s;
            z-index: 1000;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { background: #27AE60; }
        .toast.error { background: #C0392B; }
        .toast.info { background: #3498DB; }

        /* ============================================
           📱 АДАПТИВ: ПЛАНШЕТЫ И БОЛЬШИЕ ТЕЛЕФОНЫ
           ============================================ */
        @media (max-width: 900px) {
            .container { padding: 25px; }
            h1 { font-size: 1.8rem; }
            
            .control-group.span-2 { grid-column: span 1; }
        }

        /* ============================================
           📱 АДАПТИВ: ТЕЛЕФОНЫ (до 768px)
           ============================================ */
        @media (max-width: 768px) {
            body { padding: 10px; }
            
            .container {
                padding: 18px;
                border-radius: 15px;
            }
            
            h1 {
                font-size: 1.4rem;
                margin-bottom: 18px;
            }

            .season-selector {
                gap: 6px;
                margin-bottom: 18px;
            }

            .season-btn {
                padding: 8px 14px;
                font-size: 0.85rem;
                border-width: 1.5px;
            }

            .controls {
                grid-template-columns: 1fr;
                gap: 12px;
                margin-bottom: 18px;
            }

            .control-group {
                padding: 12px;
            }

            .control-group label {
                font-size: 0.88rem;
                margin-bottom: 6px;
            }

            .control-group select {
                padding: 9px 32px 9px 10px;
                font-size: 0.88rem;
            }

            /* Каскадные строки остаются в 2 колонки, но пропорционально */
            .cascaded-row {
                grid-template-columns: 2fr 3fr;
                gap: 6px;
            }

            .cascaded-row select {
                font-size: 0.82rem;
                padding: 8px 28px 8px 8px;
            }

            .status-badge {
                font-size: 0.7rem;
                padding: 2px 8px;
                margin-top: 5px;
            }

            .canvas-container {
                border-width: 2px;
                width: 100%;
            }

            .buttons {
                flex-direction: column;
                gap: 10px;
            }

            .btn {
                width: 100%;
                padding: 12px 20px;
                font-size: 0.92rem;
                min-width: 0;
            }

            .info {
                font-size: 0.82rem;
            }

            .toast {
                bottom: 15px;
                padding: 10px 18px;
                font-size: 0.85rem;
            }
        }

        /* ============================================
           📱 АДАПТИВ: МАЛЕНЬКИЕ ТЕЛЕФОНЫ (iPhone SE и т.п.)
           ============================================ */
        @media (max-width: 400px) {
            body { padding: 8px; }
            
            .container { padding: 14px; }
            
            h1 {
                font-size: 1.2rem;
                margin-bottom: 14px;
            }

            .season-btn {
                padding: 7px 11px;
                font-size: 0.78rem;
                gap: 4px;
            }

            .control-group {
                padding: 10px;
            }

            .control-group label {
                font-size: 0.82rem;
            }

            .control-group select {
                font-size: 0.82rem;
                padding: 8px 28px 8px 9px;
            }

            .cascaded-row select {
                font-size: 0.78rem;
                padding: 7px 24px 7px 7px;
            }

            .btn {
                font-size: 0.88rem;
                padding: 11px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ Генератор сезонного меню</h1>

        <div class="season-selector">
            <button class="season-btn summer active" data-season="summer">☀️ Лето</button>
            <button class="season-btn spring" data-season="spring">🌸 Весна</button>
            <button class="season-btn autumn" data-season="autumn">🍂 Осень</button>
            <button class="season-btn winter" data-season="winter">❄️ Зима</button>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>🍲 Первое блюдо (суп)</label>
                <select id="firstSelect">
                    <option value="">-- Выберите суп --</option>
                </select>
                <span class="status-badge" id="firstStatus">Не выбрано</span>
            </div>

            <div class="control-group span-2">
                <label>🍖 Второе блюдо</label>
                <div class="cascaded-row">
                    <select id="secondCategorySelect">
                        <option value="">-- Категория --</option>
                    </select>
                    <select id="secondSelect" disabled>
                        <option value="">-- Выберите блюдо --</option>
                    </select>
                </div>
                <span class="status-badge" id="secondStatus">Не выбрано</span>
            </div>

            <div class="control-group">
                <label>🥗 Салат</label>
                <select id="saladSelect">
                    <option value="">-- Выберите салат --</option>
                </select>
                <span class="status-badge" id="saladStatus">Не выбрано</span>
            </div>

            <div class="control-group span-2">
                <label>🍰 Десерт</label>
                <div class="cascaded-row">
                    <select id="dessertCategorySelect">
                        <option value="">-- Категория --</option>
                    </select>
                    <select id="dessertSelect" disabled>
                        <option value="">-- Выберите десерт --</option>
                    </select>
                </div>
                <span class="status-badge" id="dessertStatus">Не выбрано</span>
            </div>

            <div class="control-group">
                <label>🥤 Напиток 1</label>
                <select id="drink1Select">
                    <option value="">-- Выберите --</option>
                </select>
                <span class="status-badge" id="drink1Status">Не выбрано</span>
            </div>

            <div class="control-group">
                <label>🥤 Напиток 2</label>
                <select id="drink2Select">
                    <option value="">-- Выберите --</option>
                </select>
                <span class="status-badge" id="drink2Status">Не выбрано</span>
            </div>

            <div class="control-group">
                <label>🥤 Напиток 3</label>
                <select id="drink3Select">
                    <option value="">-- Выберите --</option>
                </select>
                <span class="status-badge" id="drink3Status">Не выбрано</span>
            </div>
        </div>

        <div class="preview-section">
            <div class="canvas-container">
                <div class="loading" id="loading">
                    <div class="loading-spinner"></div>
                    Загрузка шаблона...
                </div>
                <canvas id="mainCanvas"></canvas>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-primary" id="downloadBtn" disabled>📥 Сохранить меню</button>
            <button class="btn btn-secondary" id="resetBtn">🔄 Сбросить</button>
        </div>

        <p class="info">На телефоне меню сохранится прямо в галерею. На компьютере — скачается файлом.</p>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // 🎯 КОНФИГУРАЦИЯ
        // ============================================
        
        const DISH_CONFIG = {
            first: { x: 77, y: 471, width: 877, height: 320 },
            second: { x: 124, y: 675, width: 877, height: 320 },
            salad: { x: 77, y: 1026, width: 877, height: 320 },
            dessert: { x: 124, y: 1230, width: 877, height: 320 },
            drinks: [
                { x: 124, y: 1585, width: 263, height: 190 },
                { x: 410, y: 1585, width: 263, height: 190 },
                { x: 694, y: 1585, width: 263, height: 190 }
            ]
        };

        const SEASONS = {
            summer: {
                name: 'Лето',
                file: 'Shablon_Leto.png',
                filter: { color: '#747B57', mode: 'soft-light' },
                circleColor: '#5AA32D'
            },
            spring: {
                name: 'Весна',
                file: 'Shablon_Vesna.png',
                filter: { color: '#734646', mode: 'soft-light' },
                circleColor: '#A32D2D'
            },
            winter: {
                name: 'Зима',
                file: 'Shablon_Zima.png',
                filter: { color: '#465A73', mode: 'soft-light' },
                circleColor: null
            },
            autumn: {
                name: 'Осень',
                file: 'Shablon_Osen.png',
                filter: null,
                circleColor: '#A3562D'
            }
        };

        const CIRCLE_ORIGINAL = { r: 45, g: 97, b: 163 };
        const CIRCLE_TOLERANCE = 40;

        const FOLDERS = {
            first:   'First/',
            salad:   'Salad/',
            drinks:  'Drinks/'
        };

        const SECOND_CATEGORIES = {
            'grechka':   { name: 'Гречка',     folder: 'Second/Grechka/' },
            'kapusta':   { name: 'Капуста',    folder: 'Second/Kapusta/' },
            'kartoshka': { name: 'Картошка',   folder: 'Second/Kartoshka/' },
            'makaroni':  { name: 'Макароны',   folder: 'Second/Makaroni/' },
            'perlovka':  { name: 'Перловка',   folder: 'Second/Perlovka/' },
            'ris':       { name: 'Рис',        folder: 'Second/Ris/' },
            'ekzotika':  { name: 'Экзотика',   folder: 'Second/Ekzotika/' }
        };

        // ============================================
        // СОСТОЯНИЕ
        // ============================================
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const loading = document.getElementById('loading');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const toast = document.getElementById('toast');

        let templateImage = null;
        let currentSeason = 'summer';

        const selectedDishes = {
            first: null, second: null, salad: null, dessert: null,
            drink1: null, drink2: null, drink3: null
        };

        const dishImages = {
            first: null, second: null, salad: null, dessert: null,
            drink1: null, drink2: null, drink3: null
        };

        const recoloredCache = {};

        // ============================================
        // TOAST
        // ============================================

        function showToast(message, type = 'info', duration = 3000) {
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
                || (navigator.maxTouchPoints && navigator.maxTouchPoints > 2);
        }

        // ============================================
        // ПЕРЕКРАСКА
        // ============================================
        
        function recolorCircle(img, targetColorHex) {
            if (!targetColorHex) return img;

            const cacheKey = img.src + '_' + targetColorHex;
            if (recoloredCache[cacheKey]) return recoloredCache[cacheKey];

            const offscreen = document.createElement('canvas');
            offscreen.width = img.width;
            offscreen.height = img.height;
            const offCtx = offscreen.getContext('2d');
            offCtx.drawImage(img, 0, 0);

            const imageData = offCtx.getImageData(0, 0, offscreen.width, offscreen.height);
            const data = imageData.data;

            const newR = parseInt(targetColorHex.slice(1, 3), 16);
            const newG = parseInt(targetColorHex.slice(3, 5), 16);
            const newB = parseInt(targetColorHex.slice(5, 7), 16);

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                if (Math.abs(r - CIRCLE_ORIGINAL.r) <= CIRCLE_TOLERANCE &&
                    Math.abs(g - CIRCLE_ORIGINAL.g) <= CIRCLE_TOLERANCE &&
                    Math.abs(b - CIRCLE_ORIGINAL.b) <= CIRCLE_TOLERANCE) {
                    data[i] = newR;
                    data[i + 1] = newG;
                    data[i + 2] = newB;
                }
            }

            offCtx.putImageData(imageData, 0, 0);
            recoloredCache[cacheKey] = offscreen;
            return offscreen;
        }

        function getImageForDraw(type) {
            const img = dishImages[type];
            if (!img) return null;
            if (type.startsWith('drink')) return img;
            const seasonConfig = SEASONS[currentSeason];
            return recolorCircle(img, seasonConfig.circleColor);
        }

        // ============================================
        // УТИЛИТЫ
        // ============================================

        function formatDishName(filename) {
            if (!filename) return '';
            const nameOnly = filename.split('/').pop();
            let name = nameOnly.replace(/\.(png|jpg|jpeg)$/i, '');
            name = name.replace(/_/g, ' ').replace(/\s+/g, ' ').trim();
            return name;
        }

        async function fetchJSON(path) {
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.warn(`Не удалось загрузить ${path}:`, error.message);
                return null;
            }
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // ============================================
        // ЗАГРУЗКА ШАБЛОНА
        // ============================================

        async function loadTemplate() {
            return new Promise((resolve, reject) => {
                const seasonConfig = SEASONS[currentSeason];
                loading.style.display = 'flex';
                loading.innerHTML = '<div class="loading-spinner"></div>Загрузка шаблона...';

                const img = new Image();
                img.onload = () => {
                    templateImage = img;
                    canvas.width = img.width;
                    canvas.height = img.height;
                    drawCanvas();
                    loading.style.display = 'none';
                    resolve();
                };
                img.onerror = () => {
                    loading.innerHTML = `<div class="loading-spinner" style="border-top-color:#c0392b"></div>Ошибка: ${seasonConfig.file}`;
                    reject(new Error('Не удалось загрузить шаблон'));
                };
                img.src = seasonConfig.file;
            });
        }

        // ============================================
        // ОТРИСОВКА
        // ============================================

        function drawCanvas(applyFilter = true) {
            if (!templateImage) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(templateImage, 0, 0);

            ['first', 'second', 'salad', 'dessert'].forEach(type => {
                const img = getImageForDraw(type);
                if (img) {
                    const config = DISH_CONFIG[type];
                    ctx.drawImage(img, config.x, config.y, config.width, config.height);
                }
            });

            ['drink1', 'drink2', 'drink3'].forEach((type, idx) => {
                const img = dishImages[type];
                if (img && DISH_CONFIG.drinks[idx]) {
                    const pos = DISH_CONFIG.drinks[idx];
                    ctx.drawImage(img, pos.x, pos.y, pos.width, pos.height);
                }
            });

            const seasonConfig = SEASONS[currentSeason];
            if (applyFilter && seasonConfig.filter) {
                ctx.save();
                ctx.globalCompositeOperation = seasonConfig.filter.mode;
                ctx.fillStyle = hexToRgba(seasonConfig.filter.color, 1);
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
            }
        }

        // ============================================
        // ЗАГРУЗКА БЛЮД
        // ============================================

        function loadDishImage(type, filepath) {
            return new Promise((resolve, reject) => {
                if (!filepath) {
                    dishImages[type] = null;
                    drawCanvas();
                    resolve();
                    return;
                }

                const img = new Image();
                img.onload = () => {
                    dishImages[type] = img;
                    drawCanvas();
                    resolve();
                };
                img.onerror = () => reject(new Error(`Не удалось загрузить ${filepath}`));
                img.src = filepath;
            });
        }

        // ============================================
        // ЗАГРУЗКА ФАЙЛОВ
        // ============================================

        async function getDishFiles(type) {
            const data = await fetchJSON(FOLDERS[type] + 'index.json');
            return (data && Array.isArray(data.files)) ? data.files : [];
        }

        async function getSecondCategories() {
            const data = await fetchJSON('Second/index.json');
            return (data && data.categories) ? data.categories : SECOND_CATEGORIES;
        }

        async function getDessertCategories() {
            const data = await fetchJSON('Dessert/index.json');
            return (data && data.categories) ? data.categories : {};
        }

        async function getFilesFromFolder(folderPath) {
            const data = await fetchJSON(folderPath + 'index.json');
            return (data && Array.isArray(data.files)) ? data.files : [];
        }

        // ============================================
        // ЗАПОЛНЕНИЕ СПИСКОВ
        // ============================================

        async function populateSelects() {
            const firstSelect = document.getElementById('firstSelect');
            (await getDishFiles('first')).forEach(file => {
                const opt = document.createElement('option');
                opt.value = FOLDERS.first + file;
                opt.textContent = formatDishName(file);
                firstSelect.appendChild(opt);
            });

            const saladSelect = document.getElementById('saladSelect');
            (await getDishFiles('salad')).forEach(file => {
                const opt = document.createElement('option');
                opt.value = FOLDERS.salad + file;
                opt.textContent = formatDishName(file);
                saladSelect.appendChild(opt);
            });

            const catSelect = document.getElementById('secondCategorySelect');
            const secondCats = await getSecondCategories();
            Object.entries(secondCats).forEach(([key, cat]) => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = cat.name;
                catSelect.appendChild(opt);
            });

            const dessertCatSelect = document.getElementById('dessertCategorySelect');
            const dessertCats = await getDessertCategories();
            Object.entries(dessertCats).forEach(([key, cat]) => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = cat.name;
                dessertCatSelect.appendChild(opt);
            });

            const drinkFiles = await getDishFiles('drinks');
            ['drink1Select', 'drink2Select', 'drink3Select'].forEach(selectId => {
                const select = document.getElementById(selectId);
                drinkFiles.forEach(file => {
                    const opt = document.createElement('option');
                    opt.value = FOLDERS.drinks + file;
                    opt.textContent = formatDishName(file);
                    select.appendChild(opt);
                });
            });
        }

        // ============================================
        // СМЕНА СЕЗОНА
        // ============================================

        document.querySelectorAll('.season-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const season = e.currentTarget.dataset.season;
                if (season === currentSeason) return;

                document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
                e.currentTarget.classList.add('active');

                currentSeason = season;

                for (const key in recoloredCache) delete recoloredCache[key];

                try {
                    await loadTemplate();
                    showToast(`🌦️ Сезон "${SEASONS[season].name}" активирован`, 'success');
                } catch (error) {
                    console.error('Ошибка смены сезона:', error);
                }
            });
        });

        // ============================================
        // КАТЕГОРИИ
        // ============================================

        document.getElementById('secondCategorySelect').addEventListener('change', async (e) => {
            const categoryKey = e.target.value;
            const secondSelect = document.getElementById('secondSelect');
            
            secondSelect.innerHTML = '<option value="">-- Выберите блюдо --</option>';
            secondSelect.disabled = !categoryKey;
            secondSelect.value = '';
            selectedDishes.second = null;
            dishImages.second = null;
            
            if (!categoryKey) {
                updateStatusBadge('second', false);
                drawCanvas();
                updateDownloadButton();
                return;
            }

            const categories = await getSecondCategories();
            const category = categories[categoryKey];

            const files = await getFilesFromFolder(category.folder);
            files.forEach(file => {
                const opt = document.createElement('option');
                opt.value = category.folder + file;
                opt.textContent = formatDishName(file);
                secondSelect.appendChild(opt);
            });
        });

        document.getElementById('dessertCategorySelect').addEventListener('change', async (e) => {
            const categoryKey = e.target.value;
            const dessertSelect = document.getElementById('dessertSelect');
            
            dessertSelect.innerHTML = '<option value="">-- Выберите десерт --</option>';
            dessertSelect.disabled = !categoryKey;
            dessertSelect.value = '';
            selectedDishes.dessert = null;
            dishImages.dessert = null;
            
            if (!categoryKey) {
                updateStatusBadge('dessert', false);
                drawCanvas();
                updateDownloadButton();
                return;
            }

            const categories = await getDessertCategories();
            const category = categories[categoryKey];

            const files = await getFilesFromFolder(category.folder);
            files.forEach(file => {
                const opt = document.createElement('option');
                opt.value = category.folder + file;
                opt.textContent = formatDishName(file);
                dessertSelect.appendChild(opt);
            });
        });

        // ============================================
        // ВЫБОР БЛЮД
        // ============================================

        document.getElementById('firstSelect').addEventListener('change', async (e) => {
            selectedDishes.first = e.target.value;
            await loadDishImage('first', e.target.value);
            updateStatusBadge('first', !!e.target.value);
            updateDownloadButton();
        });

        document.getElementById('secondSelect').addEventListener('change', async (e) => {
            selectedDishes.second = e.target.value;
            await loadDishImage('second', e.target.value);
            updateStatusBadge('second', !!e.target.value);
            updateDownloadButton();
        });

        document.getElementById('saladSelect').addEventListener('change', async (e) => {
            selectedDishes.salad = e.target.value;
            await loadDishImage('salad', e.target.value);
            updateStatusBadge('salad', !!e.target.value);
            updateDownloadButton();
        });

        document.getElementById('dessertSelect').addEventListener('change', async (e) => {
            selectedDishes.dessert = e.target.value;
            await loadDishImage('dessert', e.target.value);
            updateStatusBadge('dessert', !!e.target.value);
            updateDownloadButton();
        });

        ['drink1', 'drink2', 'drink3'].forEach(type => {
            document.getElementById(type + 'Select').addEventListener('change', async (e) => {
                selectedDishes[type] = e.target.value;
                await loadDishImage(type, e.target.value);
                updateStatusBadge(type, !!e.target.value);
                updateDownloadButton();
            });
        });

        // ============================================
        // UI ХЕЛПЕРЫ
        // ============================================

        function updateStatusBadge(type, active) {
            const badge = document.getElementById(type + 'Status');
            if (!badge) return;
            badge.classList.toggle('active', active);
            badge.textContent = active ? '✓ Выбрано' : 'Не выбрано';
        }

        function updateDownloadButton() {
            const hasSelection = Object.values(selectedDishes).some(v => v);
            downloadBtn.disabled = !hasSelection;
        }

        // ============================================
        // ЭКСПОРТ
        // ============================================

        async function saveToGallery(blob, filename) {
            const file = new File([blob], filename, { type: 'image/png' });
            
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'Меню',
                        text: `Сезонное меню — ${SEASONS[currentSeason].name}`
                    });
                    showToast('✅ Меню сохранено!', 'success');
                    return true;
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        console.error('Ошибка Web Share:', err);
                        return false;
                    }
                    return true;
                }
            }
            return false;
        }

        function downloadAsFile(blob, filename) {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = filename;
            link.href = url;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        downloadBtn.addEventListener('click', async () => {
            if (!templateImage) return;

            drawCanvas(true);

            const seasonName = SEASONS[currentSeason].name.toLowerCase();
            const filename = `меню_${seasonName}_${new Date().toISOString().slice(0, 10)}.png`;

            downloadBtn.disabled = true;
            const originalText = downloadBtn.innerHTML;
            downloadBtn.innerHTML = '<div class="loading-spinner" style="width:20px;height:20px;border-width:3px;"></div> Подготовка...';

            try {
                const blob = await new Promise(resolve => {
                    canvas.toBlob(resolve, 'image/png', 1.0);
                });

                if (!blob) throw new Error('Не удалось создать изображение');

                if (isMobileDevice()) {
                    const shared = await saveToGallery(blob, filename);
                    
                    if (!shared) {
                        downloadAsFile(blob, filename);
                        showToast('💾 Файл скачан. Переместите его в галерею вручную.', 'info', 5000);
                    }
                } else {
                    downloadAsFile(blob, filename);
                    showToast('✅ Меню скачано!', 'success');
                }

            } catch (error) {
                console.error('Ошибка экспорта:', error);
                showToast('❌ Ошибка сохранения. Попробуйте ещё раз.', 'error');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = originalText;
                updateDownloadButton();
            }
        });

        resetBtn.addEventListener('click', () => {
            const allSelects = [
                'firstSelect', 'secondCategorySelect', 'secondSelect',
                'saladSelect', 'dessertCategorySelect', 'dessertSelect',
                'drink1Select', 'drink2Select', 'drink3Select'
            ];
            allSelects.forEach(id => {
                document.getElementById(id).value = '';
            });

            ['secondSelect', 'dessertSelect'].forEach(id => {
                const el = document.getElementById(id);
                el.disabled = true;
                el.innerHTML = id === 'secondSelect' 
                    ? '<option value="">-- Выберите блюдо --</option>' 
                    : '<option value="">-- Выберите десерт --</option>';
            });

            Object.keys(selectedDishes).forEach(type => {
                selectedDishes[type] = null;
                dishImages[type] = null;
                updateStatusBadge(type, false);
            });

            drawCanvas();
            updateDownloadButton();
        });

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================

        (async function init() {
            try {
                await loadTemplate();
                await populateSelects();
            } catch (error) {
                console.error('Ошибка инициализации:', error);
                loading.innerHTML = '<div class="loading-spinner" style="border-top-color:#c0392b"></div>Ошибка загрузки';
            }
        })();
    </script>
</body>
</html>
